<!-- Subtle Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[100]" style="background-image: url('https://www.transparenttextures.com/patterns/p6.png');"></div>
<script>
        // Simple micro-interaction for the top nav reveal on scroll
        let lastScroll = 0;
        const header = document.querySelector('header');
        
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            
            if (currentScroll <= 0) {
                header.classList.remove('-translate-y-full');
                header.classList.add('bg-transparent');
                header.classList.remove('bg-surface/80');
                return;
            }
            
            if (currentScroll > lastScroll && currentScroll > 64) {
                header.classList.add('-translate-y-full');
            } else {
                header.classList.remove('-translate-y-full');
                header.classList.add('bg-surface/80');
                header.classList.remove('bg-transparent');
            }
            lastScroll = currentScroll;
        });

        // Initialize state
        document.addEventListener('DOMContentLoaded', () => {
            if (window.pageYOffset === 0) {
                header.classList.add('bg-transparent');
                header.classList.remove('bg-surface/80');
            }
        });
    </script>
